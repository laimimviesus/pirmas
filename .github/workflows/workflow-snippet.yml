# Add this to the END of your existing .github/workflows/scraper.yml workflow,
# AS A NEW STEP inside the main job (not a separate job).
#
# It captures the entire job's log output and uploads it as an artifact.
# `if: always()` means it runs even if earlier steps failed.

      - name: Save scraper log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_number }}
          path: |
            scraper-output.log
          retention-days: 7

# Note: this assumes your scraper writes output to `scraper-output.log`.
# If your scraper currently just prints to stdout, change the step that
# runs the scraper to TEE its output to that file:
#
#       - name: Run scraper
#         run: |
#           node scripts/scraper.js 2>&1 | tee scraper-output.log
#
# The `2>&1` captures both stdout + stderr. The `tee` writes to file AND
# still shows live output in the Actions UI.
