name: Mercell Tender Scraper

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (test or run)'
        required: true
        default: 'test'
  schedule:
    - cron: '0 8 * * *' # Every day at 08:00 UTC

env:
  NODE_OPTIONS: --no-experimental-fetch

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Prepare credentials
        if: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY != '' }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > ./gcloud-service-key.json
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Run scraper (test or run)
        env:
          MERCELL_USERNAME: ${{ secrets.MERCELL_USERNAME }}
          MERCELL_PASSWORD: ${{ secrets.MERCELL_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS: ${{ secrets.EMAIL_SMTP_PASS }}
        run: |
          MODE="${{ github.event.inputs.mode || 'test' }}"
          echo "Running scraper in mode: $MODE"
          if [ "$MODE" = "test" ] then
            node scripts/scraper.js --test
          else
            node scripts/scraper.js
          fi

      - name: Upload logs (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mercell-scraper-logs
          path: |
            ./scraper-log-*.log
            ./debug-*.json
