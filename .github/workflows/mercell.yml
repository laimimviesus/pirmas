name: Mercell Scraper

on:
  # Rankinis paleidimas per GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      retranslate_stale:
        description: 'Backfill mode — re-translate stale TITLE/SCOPE only'
        type: boolean
        default: false
      test_mode:
        description: 'Test mode (tik 2 tender\iai jei true, visi jei false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Automatinis paleidimas kasdien 00:00 UTC (03:00 Vilniaus laiku)
  schedule:
    - cron: '0 0 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 600   # max 10 valanda - daugiau nei užteks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install puppeteer pdf-parse googleapis mammoth xlsx adm-zip

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2t64

      - name: Run scraper
        env:
          MERCELL_USERNAME: ${{ secrets.MERCELL_USERNAME }}
          MERCELL_PASSWORD: ${{ secrets.MERCELL_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SHEET_TAB_NAME: ${{ secrets.SHEET_TAB_NAME || 'Sheet1' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PORTAL_CREDS_JSON: ${{ secrets.PORTAL_CREDS_JSON }}
          RETRANSLATE_STALE: ${{ inputs.retranslate_stale && '1' || '' }}
        run: node scripts/scraper.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: |
            /tmp/*.log
            screenshot-*.png
          retention-days: 7
